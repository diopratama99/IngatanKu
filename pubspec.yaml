name: ingatanku
description: "IngatanKu - Tech Second Brain. Save tech content, chat with your knowledge."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Backend
  supabase_flutter: ^2.5.6

  # Routing
  go_router: ^14.2.0

  # DI
  get_it: ^7.7.0

  # FP
  dartz: ^0.10.1

  # UI / UX
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_markdown: ^0.7.3
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  http: ^1.2.2
  share_plus: ^10.0.2

  # Voice input
  # 7.x dropped Flutter v1 embedding (required by Flutter SDK 3.29+)
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1

  # OTP input UI
  pinput: ^5.0.0

  # Receive shared content (URL, text) from other apps
  receive_sharing_intent: ^1.8.0

  # Local notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/lottie/
    - assets/images/
